<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/all-mimify.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Pishro theme</title>
  </head>
  <body>
    <section class="hero-top-header">
      <div class="container">
        <div class="top-header">
          <div class="t-h-right">
            <span
              >محصولات جدید: لباس های مجلسی شارژ شد یک سر به بخش لباس های مجلسی
              بزنید</span
            >
          </div>
          <div class="t-h-left">
            <span>اگر سوال یا مشکلی دارید با پشتیبانی تماس بگیرید</span>
            <span class="contact-header"
              >7895-021
              <i class="fa-solid fa-headset"></i>
            </span>
          </div>
        </div>
      </div>
    </section>
    <div class="container">
      <header class="main-header">
          <div class="m-h-right">
            <div class="logo">
              <a href="#">
                <img src="./img/logo.png" alt="logo" />
              </a>
            </div>
            <div class="search-main">
              <form>
                <input
                  type="search"
                  placeholder="جستجو در لیست محصولات"
                />
                <button type="submit">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
              </form>
            </div>
          </div>
          <div class="m-h-left">
            <div class="cart-btn-header">
              <a href="#" target="_blank">
                <span class="cart-btn-text">سبد خرید</span>
                <span class="cart-btn-num">5</span>
              </a>
            </div>
            <div class="favorite-btn-header">
              <a href="#" target="_blank">
                <i class="fa-regular fa-heart"></i>
                <span>علاقه مندی</span>
              </a>
            </div>
          </div>

      </header>
    </div>
  </body>
</html>
