<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/all-mimify.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Pishro theme</title>
  </head>
  <body>
    <section class="hero-top-header">
      <div class="container">
        <div class="top-header">
          <div class="t-h-right">
            <span
              >محصولات جدید: لباس های مجلسی شارژ شد یک سر به بخش لباس های مجلسی
              بزنید</span
            >
          </div>
          <div class="t-h-left">
            <span>اگر سوال یا مشکلی دارید با پشتیبانی تماس بگیرید</span>
            <span class="contact-header"
              >7895-021
              <i class="fa-solid fa-headset"></i>
            </span>
          </div>
        </div>
      </div>
    </section>
    <div class="container">
      <header class="main-header">
        <div class="m-h-right">
          <div class="logo">
            <a href="#">
              <img src="./img/logo.png" alt="logo" />
            </a>
          </div>
          <div class="search-main">
            <form>
              <input type="search" placeholder="جستجو در لیست محصولات" />
              <button type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </form>
          </div>
        </div>
        <div class="m-h-left">
          <div class="favorite-btn-header">
            <a href="#" target="_blank">
              <i class="fa-regular fa-heart"></i>
              <span>علاقه مندی</span>
            </a>
          </div>
          <div class="cart-btn-header">
            <a href="#" target="_blank">
              <span class="cart-btn-text">سبد خرید</span>
              <span class="cart-btn-num">12</span>
            </a>
          </div>
        </div>
      </header>
      <section class="down-header">
        <nav class="main-menu">
          <div class="megamenu-box">
            <div class="t-m">
              <i class="fa-solid fa-bars"></i>
              <span>دسته بندی محصول</span>
            </div>
          </div>

          <div class="menu-header">
            <ul>
              <li><a href="#">فروشگاه</a></li>
              <li><a href="#">تخفیفات شگفت انگیز</a></li>
              <li><a href="#">حساب کاربری من</a></li>
              <li><a href="#">ارتباط با ما</a></li>
              <li><a href="#">در باره ما</a></li>
            </ul>
          </div>
        </nav>
        <div class="register-btn">
          <i class="far fa-circle-user"></i>
          <span>ورود/ثبت نام</span>
        </div>
      </section>
    </div>
  </body>
</html>
